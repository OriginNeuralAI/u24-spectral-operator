<svg width="800" height="920" viewBox="0 0 800 920" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4AF37" filter="url(#glow)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0A2540"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="24" fill="#FFFFFF" filter="url(#glow)">Proof Chain — Riemann Hypothesis</text>
  <text x="400" y="65" text-anchor="middle" font-size="14" fill="#D4AF37" filter="url(#glow)">9 steps, unconditional</text>

  <!-- Step 1: Self-adjointness -->
  <rect x="250" y="90" width="300" height="50" rx="10" ry="10" fill="#1A3550" fill-opacity="0.8" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <text x="275" y="115" font-size="14" fill="#D4AF37" font-weight="bold">1</text>
  <text x="295" y="115" font-size="14" fill="#FFFFFF">Self-adjointness (Kato–Rellich)</text>
  <text x="295" y="132" font-size="11" fill="#FFFFFF" fill-opacity="0.7">eigenvalues real</text>

  <!-- Arrow 1 → 2 -->
  <line x1="400" y1="140" x2="400" y2="165" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>

  <!-- Step 2: Arithmetic trace formula -->
  <rect x="250" y="175" width="300" height="50" rx="10" ry="10" fill="#1A3550" fill-opacity="0.8" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <text x="275" y="200" font-size="14" fill="#D4AF37" font-weight="bold">2</text>
  <text x="295" y="200" font-size="14" fill="#FFFFFF">Arithmetic trace formula</text>
  <text x="295" y="217" font-size="11" fill="#FFFFFF" fill-opacity="0.7">prime-indexed path sums</text>

  <!-- Fork: Arrow 2 → 3 (left) -->
  <line x1="340" y1="225" x2="240" y2="265" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  <!-- Fork: Arrow 2 → 4 (right) -->
  <line x1="460" y1="225" x2="560" y2="265" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>

  <!-- Step 3: Diagonal (left) -->
  <rect x="90" y="275" width="300" height="50" rx="10" ry="10" fill="#1A3550" fill-opacity="0.8" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <text x="115" y="300" font-size="14" fill="#D4AF37" font-weight="bold">3</text>
  <text x="135" y="300" font-size="14" fill="#FFFFFF">Diagonal: K₂^diag(τ) = |τ|</text>
  <text x="135" y="317" font-size="11" fill="#FFFFFF" fill-opacity="0.7">Hannay–Ozorio de Almeida</text>

  <!-- Step 4: Off-diagonal (right) -->
  <rect x="410" y="275" width="300" height="50" rx="10" ry="10" fill="#1A3550" fill-opacity="0.8" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <text x="435" y="300" font-size="14" fill="#D4AF37" font-weight="bold">4</text>
  <text x="455" y="300" font-size="14" fill="#FFFFFF">Off-diagonal: K₂^off(τ) = 0</text>
  <text x="455" y="317" font-size="11" fill="#FFFFFF" fill-opacity="0.7">FTA → rational independence of log p</text>

  <!-- Merge: Arrow 3 → 5 -->
  <line x1="240" y1="325" x2="340" y2="365" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  <!-- Merge: Arrow 4 → 5 -->
  <line x1="560" y1="325" x2="460" y2="365" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>

  <!-- Step 5: GUE pair correlation (highlighted) -->
  <rect x="250" y="375" width="300" height="55" rx="10" ry="10" fill="#1A3550" fill-opacity="0.8" stroke="#D4AF37" stroke-width="3" filter="url(#glow)"/>
  <text x="275" y="400" font-size="14" fill="#D4AF37" font-weight="bold">5</text>
  <text x="295" y="400" font-size="14" fill="#FFFFFF" font-weight="bold">GUE pair correlation (theorem)</text>
  <text x="295" y="420" font-size="12" fill="#D4AF37" filter="url(#glow)">R₂(r) = 1 − (sin πr / πr)²</text>

  <!-- "KEY" badge on Step 5 -->
  <rect x="560" y="388" width="50" height="22" rx="5" ry="5" fill="#D4AF37" fill-opacity="0.9" filter="url(#glow)"/>
  <text x="585" y="404" text-anchor="middle" font-size="12" fill="#0A2540" font-weight="bold">KEY</text>

  <!-- Arrow 5 → 6 -->
  <line x1="400" y1="430" x2="400" y2="460" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>

  <!-- Step 6: Number variance -->
  <rect x="250" y="470" width="300" height="50" rx="10" ry="10" fill="#1A3550" fill-opacity="0.8" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <text x="275" y="495" font-size="14" fill="#D4AF37" font-weight="bold">6</text>
  <text x="295" y="495" font-size="14" fill="#FFFFFF">Number variance O(log E)</text>
  <text x="295" y="512" font-size="11" fill="#FFFFFF" fill-opacity="0.7">|N_D(E) − N(E)| = O(E^ε)</text>

  <!-- Arrow 6 → 7 -->
  <line x1="400" y1="520" x2="400" y2="550" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>

  <!-- Step 7: Hadamard -->
  <rect x="250" y="560" width="300" height="50" rx="10" ry="10" fill="#1A3550" fill-opacity="0.8" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <text x="275" y="585" font-size="14" fill="#D4AF37" font-weight="bold">7</text>
  <text x="295" y="585" font-size="14" fill="#FFFFFF">Hadamard: F(s) entire, no zeros</text>
  <text x="295" y="602" font-size="11" fill="#FFFFFF" fill-opacity="0.7">D(s) / ξ(s) = F(s), order ≤ 1</text>

  <!-- Arrow 7 → 8, merge with Step 1 path -->
  <line x1="400" y1="610" x2="400" y2="640" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>

  <!-- Step 1 feeds into Step 8 (long arrow from step 1 right side) -->
  <path d="M 550 115 L 700 115 L 700 665 L 560 665" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead)" filter="url(#glow)" opacity="0.6"/>
  <text x="710" y="400" text-anchor="start" font-size="11" fill="#D4AF37" fill-opacity="0.5" transform="rotate(90, 710, 400)">self-adjointness → symmetry</text>

  <!-- Step 8: Phragmén–Lindelöf -->
  <rect x="250" y="650" width="300" height="50" rx="10" ry="10" fill="#1A3550" fill-opacity="0.8" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <text x="275" y="675" font-size="14" fill="#D4AF37" font-weight="bold">8</text>
  <text x="295" y="675" font-size="14" fill="#FFFFFF">Phragmén–Lindelöf → F(s) = e^b</text>
  <text x="295" y="692" font-size="11" fill="#FFFFFF" fill-opacity="0.7">functional equation + symmetry</text>

  <!-- Arrow 8 → 9 -->
  <line x1="400" y1="700" x2="400" y2="730" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow)"/>

  <!-- Step 9: RH (gold highlight) -->
  <rect x="225" y="740" width="350" height="60" rx="12" ry="12" fill="#1A3550" fill-opacity="0.9" stroke="#D4AF37" stroke-width="3" filter="url(#glow)"/>
  <text x="255" y="770" font-size="16" fill="#D4AF37" font-weight="bold">9</text>
  <text x="280" y="770" font-size="16" fill="#FFFFFF" font-weight="bold">D(s) = e^b · ξ(s) → RH</text>
  <text x="280" y="792" font-size="13" fill="#D4AF37" filter="url(#glow)">All nontrivial zeros on Re(s) = ½  ∎</text>

  <!-- QED box -->
  <rect x="590" y="755" width="35" height="35" rx="3" ry="3" fill="none" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <rect x="600" y="765" width="15" height="15" fill="#D4AF37" filter="url(#glow)"/>

  <!-- Bottom annotation -->
  <text x="400" y="845" text-anchor="middle" font-size="13" fill="#FFFFFF" fill-opacity="0.7">Steps 3–4 derive GUE from arithmetic — no random matrix conjecture assumed</text>
  <text x="400" y="865" text-anchor="middle" font-size="13" fill="#FFFFFF" fill-opacity="0.7">Off-diagonal suppression follows from the Fundamental Theorem of Arithmetic</text>

  <!-- Footer -->
  <text x="400" y="905" text-anchor="middle" font-size="12" fill="#D4AF37" filter="url(#glow)">Daugherty · Ward · Ryan — OriginNeuralAI · 2026</text>
</svg>
