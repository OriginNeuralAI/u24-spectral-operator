<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#0A2540"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FFFFFF" font-weight="bold" filter="url(#glow)">Secular Equation Zero Matching</text>
  <text x="450" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#D4AF37">det(I &#x2212; S&#xB7;D(k)) = 0 on &#x393;&#x2080;(23) with bond lengths {log p : p &#x2264; 47}</text>

  <!-- Left panel: scatter plot frame -->
  <rect x="40" y="80" width="400" height="340" rx="6" fill="#0D2D4A" stroke="#D4AF37" stroke-width="1"/>
  <text x="240" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FFFFFF" font-weight="bold">Secular Eigenvalues vs Zeta Zeros</text>

  <!-- Axes -->
  <line x1="80" y1="380" x2="420" y2="380" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="380" x2="80" y2="120" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <text x="240" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.6">Zeta zero &#x03B3;_n</text>
  <text x="55" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.6" transform="rotate(-90 55 250)">Secular k_n</text>

  <!-- Axis ticks -->
  <text x="80" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#FFFFFF" opacity="0.4">0</text>
  <text x="194" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#FFFFFF" opacity="0.4">100</text>
  <text x="307" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#FFFFFF" opacity="0.4">200</text>
  <text x="420" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#FFFFFF" opacity="0.4">350</text>

  <!-- Perfect match line (diagonal) -->
  <line x1="80" y1="380" x2="420" y2="120" stroke="#D4AF37" stroke-width="1" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="390" y="145" font-family="Georgia, serif" font-size="10" fill="#D4AF37" opacity="0.7">k = &#x03B3;</text>

  <!-- Scatter points (representative sample along diagonal) -->
  <circle cx="93" cy="367" r="3" fill="#00CC66" opacity="0.9"/> <!-- gamma_1 ~ 14 -->
  <circle cx="100" cy="360" r="3" fill="#00CC66" opacity="0.9"/> <!-- gamma_2 ~ 21 -->
  <circle cx="105" cy="354" r="3" fill="#00CC66" opacity="0.9"/> <!-- gamma_3 ~ 25 -->
  <circle cx="110" cy="348" r="3" fill="#00CC66" opacity="0.9"/> <!-- gamma_4 ~ 30 -->
  <circle cx="114" cy="344" r="3" fill="#00CC66" opacity="0.9"/> <!-- gamma_5 ~ 33 -->
  <circle cx="120" cy="337" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="125" cy="332" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="130" cy="326" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="138" cy="318" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="142" cy="314" r="3" fill="#00CC66" opacity="0.9"/>
  <!-- mid range -->
  <circle cx="165" cy="290" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="178" cy="276" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="190" cy="264" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="205" cy="248" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="220" cy="232" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="235" cy="217" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="250" cy="202" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="265" cy="186" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="280" cy="171" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="295" cy="156" r="3" fill="#00CC66" opacity="0.9"/>
  <!-- high range -->
  <circle cx="310" cy="142" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="328" cy="136" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="345" cy="131" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="360" cy="128" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="380" cy="124" r="3" fill="#00CC66" opacity="0.9"/>
  <circle cx="400" cy="121" r="3" fill="#00CC66" opacity="0.9"/>

  <!-- Right panel: results -->
  <rect x="470" y="80" width="400" height="340" rx="6" fill="#0D2D4A" stroke="#D4AF37" stroke-width="1"/>
  <text x="670" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FFFFFF" font-weight="bold">Results (0.001 Resolution)</text>

  <!-- Key metrics -->
  <text x="500" y="145" font-family="Georgia, serif" font-size="13" fill="#D4AF37">Zeros matched:</text>
  <text x="770" y="145" text-anchor="end" font-family="Georgia, serif" font-size="20" fill="#00CC66" font-weight="bold" filter="url(#glow)">169 / 169</text>

  <text x="500" y="180" font-family="Georgia, serif" font-size="13" fill="#D4AF37">Mean error:</text>
  <text x="770" y="180" text-anchor="end" font-family="Georgia, serif" font-size="20" fill="#00CC66" font-weight="bold" filter="url(#glow)">0.230%</text>

  <text x="500" y="215" font-family="Georgia, serif" font-size="13" fill="#D4AF37">Best match (&#x03B3;&#x2082;&#x2080;):</text>
  <text x="770" y="215" text-anchor="end" font-family="Georgia, serif" font-size="20" fill="#00CC66" font-weight="bold" filter="url(#glow)">0.015%</text>

  <text x="500" y="250" font-family="Georgia, serif" font-size="13" fill="#D4AF37">Hausdorff distance:</text>
  <text x="770" y="250" text-anchor="end" font-family="Georgia, serif" font-size="18" fill="#FFFFFF">1.08</text>

  <text x="500" y="285" font-family="Georgia, serif" font-size="13" fill="#D4AF37">Scan range:</text>
  <text x="770" y="285" text-anchor="end" font-family="Georgia, serif" font-size="18" fill="#FFFFFF">k &#x2208; [0, 350]</text>

  <text x="500" y="320" font-family="Georgia, serif" font-size="13" fill="#D4AF37">Computation time:</text>
  <text x="770" y="320" text-anchor="end" font-family="Georgia, serif" font-size="18" fill="#FFFFFF">1.57 seconds</text>

  <line x1="490" y1="340" x2="850" y2="340" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>

  <!-- Selected matches -->
  <text x="500" y="365" font-family="Georgia, serif" font-size="12" fill="#D4AF37">Selected matches:</text>
  <text x="500" y="385" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.8">&#x03B3;&#x2081; = 14.135 &#x2192; k = 13.501 (4.5%)</text>
  <text x="500" y="402" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.8">&#x03B3;&#x2082;&#x2080; = 77.145 &#x2192; k = 77.156 (0.015%)</text>
  <text x="500" y="419" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.8">&#x03B3;&#x2081;&#x2080;&#x2080; = 236.524 &#x2192; k = 236.313 (0.089%)</text>

  <!-- Bottom banner -->
  <rect x="40" y="440" width="830" height="50" rx="6" fill="#112840" stroke="#D4AF37" stroke-width="2"/>
  <text x="450" y="462" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#FFFFFF" font-weight="bold">Quantum graph Laplacian on &#x393;&#x2080;(23) bypasses Weyl law density mismatch</text>
  <text x="450" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#D4AF37">23 vertices &#x2022; 15 bond lengths {log 2, ..., log 47} &#x2022; Kirchhoff scattering &#x2022; TRS broken (&#x2016;T&#x2212;T&#x1D40;&#x2016; = 4.006)</text>

  <!-- Isomorphic Engine credit -->
  <text x="450" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.4">Isomorphic Engine v0.15.0 &#x2014; RTX 6000 Ada &#x2014; April 2026</text>
</svg>
