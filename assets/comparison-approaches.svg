<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="#0A2540"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FFFFFF" font-weight="bold" filter="url(#glow)">Spectral Approaches to the Riemann Hypothesis</text>
  <text x="450" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#D4AF37">How does H_D compare to prior operator constructions?</text>

  <!-- Column headers -->
  <text x="210" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#D4AF37" font-weight="bold">Self-Adjoint?</text>
  <text x="330" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#D4AF37" font-weight="bold">GUE Derived?</text>
  <text x="460" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#D4AF37" font-weight="bold">Zeros Matched?</text>
  <text x="600" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#D4AF37" font-weight="bold">Operator Explicit?</text>
  <text x="750" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#D4AF37" font-weight="bold">Off-Diag Controlled?</text>

  <line x1="30" y1="105" x2="870" y2="105" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>

