  <text x="95" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FFFFFF" opacity="0.7">Berry-Keating</text>
  <text x="95" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.4">(1999)</text>
  <text x="210" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>
  <text x="330" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>
  <text x="460" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>
  <text x="600" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFD93D">partial</text>
  <text x="750" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>

  <!-- Row 2: Connes NCG -->
  <text x="95" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FFFFFF" opacity="0.7">Connes (NCG)</text>
  <text x="95" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.4">(1999)</text>
  <text x="210" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFD93D">unknown</text>
  <text x="330" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>
  <text x="460" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>
  <text x="600" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFD93D">abstract</text>
  <text x="750" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>

  <!-- Row 3: Sierra-Townsend -->
  <text x="95" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FFFFFF" opacity="0.7">Sierra-Townsend</text>
  <text x="95" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.4">(2008)</text>
  <text x="210" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFD93D">partial</text>
  <text x="330" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>
  <text x="460" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFD93D">partial</text>
  <text x="600" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#00CC66">&#x2713;</text>
  <text x="750" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>

  <!-- Row 4: Bender-Brody-Muller -->
  <text x="95" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FFFFFF" opacity="0.7">Bender-Brody-</text>
  <text x="95" y="336" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#FFFFFF" opacity="0.7">M&#xFC;ller</text>
  <text x="95" y="352" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.4">(2017)</text>
  <text x="210" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFD93D">claimed</text>
  <text x="330" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>
  <text x="460" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>
  <text x="600" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#00CC66">&#x2713;</text>
  <text x="750" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#FF6B6B">&#x2717;</text>

  <line x1="30" y1="370" x2="870" y2="370" stroke="#D4AF37" stroke-width="2"/>

  <!-- Row 5: This Work (highlighted) -->
  <rect x="15" y="378" width="870" height="55" rx="6" fill="#112840" stroke="#D4AF37" stroke-width="2" filter="url(#glow)"/>
  <text x="95" y="408" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#D4AF37" font-weight="bold">This Work (H_D)</text>
  <text x="95" y="426" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#D4AF37">(2026, v14.1)</text>
  <text x="210" y="412" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#00CC66" filter="url(#glow)">&#x2713;</text>
  <text x="330" y="412" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#00CC66" filter="url(#glow)">&#x2713;</text>
  <text x="460" y="402" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#00CC66" font-weight="bold" filter="url(#glow)">169/169</text>
  <text x="460" y="422" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#00CC66">(0.23% err)</text>
  <text x="600" y="412" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#00CC66" filter="url(#glow)">&#x2713;</text>
  <text x="750" y="402" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#00CC66" font-weight="bold" filter="url(#glow)">&#x2713; (FTA)</text>
  <text x="750" y="422" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#00CC66">O(N&#x207B;&#xB9;(log N)&#xB9;&#x2075;)</text>

  <!-- Footer -->
  <text x="450" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#D4AF37">GUE derived from FTA (Fundamental Theorem of Arithmetic) &#x2014; not assumed</text>
  <text x="450" y="485" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#D4AF37">Off-diagonal suppression via rational independence of {log p} &#x2014; rigorous, not semiclassical</text>
  <text x="450" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.5">Daugherty, Ward, Ryan &#x2014; Origin Neural AI, 2026</text>
